name: bibleco
description: "bibleco — Écoutez la Parole de Dieu en direct, à tout moment."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  image_path: assets/app_icon_source.png
  web:
    generate: true
    image_path: assets/app_icon_source.png
    background_color: "#000000"
