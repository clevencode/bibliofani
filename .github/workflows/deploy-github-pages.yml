# Flutter web → GitHub Pages (fonte oficial «GitHub Actions»).
#
# Como activar a «página» no GitHub (primeira vez):
# 1. Repo no GitHub → Settings → Pages
# 2. Build and deployment → Source: **GitHub Actions** (não «Deploy from a branch»)
# 3. Guardar. O próximo push em `main` (ou «Run workflow») faz build e publica.
# 4. Se aparecer pedido de aprovação: Settings → Environments → github-pages → Required reviewers (opcional).
#
# URL do projecto: https://<utilizador>.github.io/bibliofani/
# (ajusta `--base-href` abaixo se o nome do repo for outro.)
#
# Analytics: ID em web/analytics.js (DEFAULT_GA4_ID). Opcional: fork pode usar
#   window.__BIBLECO_GA4_ID__ num script inline antes de analytics.js.
#
# 404.html = cópia de index.html → recarregar em subcaminhos no Pages não devolve 404 em branco.
#
# Lighthouse «Use efficient cache lifetimes»: o GitHub Pages não permite Cache-Control longo nos estáticos.

name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # --no-web-resources-cdn: CanvasKit no mesmo origin → menos cadeia a terceiros e melhor para Lighthouse (rede).
      - run: flutter build web --release --base-href "/bibliofani/" --no-web-resources-cdn --optimization-level=4

      - name: SPA no Pages (404 → mesma shell que index.html)
        run: cp build/web/index.html build/web/404.html

      - name: Desactivar Jekyll (assets Flutter)
        run: touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
