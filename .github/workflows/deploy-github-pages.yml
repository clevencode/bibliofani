# Flutter web → GitHub Pages (fonte oficial «GitHub Actions»).
#
# 1) Repo → Settings → Pages → Build and deployment
#    Source: GitHub Actions (não «Deploy from a branch»).
# 2) No primeiro deploy: aprove o ambiente «github-pages» se o GitHub pedir.
#
# URL: https://clevencode.github.io/biblefm/
#
# Lighthouse «Use efficient cache lifetimes»: o GitHub Pages não permite Cache-Control longo nos estáticos.
# Para nota máxima nesse audit, usa um CDN/proxy (ex. Cloudflare) com cache agressivo em *.js, /canvaskit/*, *.wasm.

name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      # --no-web-resources-cdn: CanvasKit no mesmo origin → menos cadeia a terceiros e melhor para Lighthouse (rede).
      - run: flutter build web --release --base-href "/biblefm/" --no-web-resources-cdn --optimization-level=4

      - name: Desactivar Jekyll (assets Flutter)
        run: touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
